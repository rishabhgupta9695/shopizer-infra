server {
  listen 80;

  # React shop — served at root /
  location / {
    root /usr/share/nginx/shop;
    index index.html;
    try_files $uri $uri/ /index.html;
  }

  # Angular admin — served at /admin
  location /admin/ {
    alias /usr/share/nginx/admin/;
    index index.html;
    try_files $uri $uri/ /admin/index.html;
  }

  # Health check
  location /health {
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
