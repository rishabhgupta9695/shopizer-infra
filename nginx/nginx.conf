server {
  listen 80;

  # Angular admin — served at /admin
  location /admin/ {
    alias /usr/share/nginx/admin/;
    index index.html;
    try_files $uri $uri/ /admin/index.html;
  }

  # React shop — served at /shop
  location /shop/ {
    alias /usr/share/nginx/shop/;
    index index.html;
    try_files $uri $uri/ /shop/index.html;
  }

  # Health check
  location /health {
    return 200 'ok';
    add_header Content-Type text/plain;
  }
}
