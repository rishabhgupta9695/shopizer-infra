name: Build Frontend Image

on:
  workflow_dispatch:  # manual trigger
  push:
    branches: [main]
    paths:
      - 'nginx/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push combined frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./nginx
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/shopizer-frontend:latest
            ghcr.io/${{ github.repository_owner }}/shopizer-frontend:${{ github.sha }}

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Rollout new frontend image
        run: |
          kubectl rollout restart deployment/shopizer-frontend -n shopizer
          kubectl rollout status deployment/shopizer-frontend -n shopizer
