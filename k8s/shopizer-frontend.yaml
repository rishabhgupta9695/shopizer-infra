apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopizer-frontend
  namespace: shopizer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: shopizer-frontend
  template:
    metadata:
      labels:
        app: shopizer-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: shopizer-frontend
          image: ghcr.io/rishabhgupta9695/shopizer-frontend:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: shopizer-frontend
  namespace: shopizer
spec:
  type: NodePort
  selector:
    app: shopizer-frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30200
