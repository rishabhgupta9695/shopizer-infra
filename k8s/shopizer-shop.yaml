apiVersion: apps/v1
kind: Deployment
metadata:
  name: shopizer-shop
  namespace: shopizer
spec:
  replicas: 3
  selector:
    matchLabels:
      app: shopizer-shop
  template:
    metadata:
      labels:
        app: shopizer-shop
    spec:
      containers:
        - name: shopizer-shop
          image: ghcr.io/rishabhgupta9695/shopizer-shop:latest
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: shopizer-shop
  namespace: shopizer
spec:
  type: NodePort
  selector:
    app: shopizer-shop
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30300
